<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply saved theme before paint to avoid a flash. Default: dark.
      try {
        var t = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta
      name="description"
      content="Free, accurate internet speed test. Measure download, upload, ping, jitter and bufferbloat against the global edge — no signup, no ads."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SPEED — Free Internet Speed Test" />
    <meta
      property="og:description"
      content="Measure download, upload, ping, jitter and bufferbloat. Free and accurate."
    />

    <!-- Fonts: condensed display + mono, streetwear-editorial -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;800&family=Playfair+Display:ital,wght@0,500;0,700;0,800;0,900;1,500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>SPEED — Free Internet Speed Test</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
